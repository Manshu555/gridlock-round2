# Render Blueprint — backend web service (https://render.com/docs/blueprint-spec)
services:
  - type: web
    name: gridlock-backend
    runtime: docker
    dockerfilePath: ./deployment/Dockerfile.backend
    dockerContext: .
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: GRIDLOCK_CORS_ORIGINS
        value: "*"
      - key: GRIDLOCK_LOG_LEVEL
        value: INFO
      # Neon PostgreSQL — set this manually in Render dashboard (never hardcode credentials)
      - key: GRIDLOCK_DATABASE_URL
        sync: false
